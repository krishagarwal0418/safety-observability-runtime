models:
  fasttext_router:
    # Preferred: upload models/fasttext/router_head.ftz to a HF repo and set repo_id.
    repo_id: "Krishagarwal314/safety-fasttext-router"
    filename: "router_head.ftz"
    local_path: "models/fasttext/router_head.ftz"

  prompt_injection:
    # Fine-tuned prompt-injection detector.
    repo_id: "Krishagarwal314/safety-prompt-injection"
    local_path: "models/transformers/prompt_injection"

  prompt_injection_onnx_int8:
    # Optional artifact for deployment experiments; runtime uses prompt_injection above by default.
    repo_id: "Krishagarwal314/safety-prompt-injection-onnx-int8"
    local_path: "models/onnx_int8/prompt_injection"
    download: false

  moderation:
    # MiniLM ONNX toxic/spam classifier. Scope: harmful_content only
    # (toxic/spam -> harmful_content); sexual is intentionally unsupported.
    repo_id: "navodPeiris/minilm-toxic-spam-classifier"
    local_path: "models/onnx/minilm_toxic_spam"
    backend: "minilm_toxic_spam_onnx"

  moderation_onnx_int8:
    # Legacy optional artifact for CPU batch evaluation/deployment experiments.
    repo_id: "Krishagarwal314/safety-moderation-2head-onnx-int8"
    local_path: "models/onnx_int8/moderation"
    download: false

thresholds:
  # Calibrated on the narrowed observability scope:
  # prompt-injection/attack, MiniLM toxic/spam, and safe. Sexual, violence,
  # self-harm, dangerous information, and illegal activity are not claimed as
  # supported by these thresholds.
  attack_route: 0.01
  moderation_route: 0.0
  fast_allow: 0.0

  # FastText direct classification. Only direct prompt-injection is active.
  fasttext_direct_prompt_injection_score: 0.8
  fasttext_direct_prompt_injection_max_moderation: 0.05
  fasttext_direct_harmful_content_score: 1.1
  fasttext_direct_harmful_content_max_attack: 0.001

  # Direct safe-pass is intentionally disabled with an impossible threshold.
  fasttext_direct_safe_score: 1.1
  fasttext_direct_safe_max_route: 0.0

  # Model score thresholds.
  #
  # Injection (0.50): well-calibrated at default on clean eval (safe-guard
  # F1=0.993, SPML F1=0.996). No adjustment needed.
  #
  # Moderation (0.83): calibrated for navodPeiris/minilm-toxic-spam-classifier
  # on the harmful-vs-safe bakeoff in reports/moderation_candidate_compare.json.
  # This model has no sexual head; sexual_review is disabled with an impossible
  # threshold and the runtime adapter emits sexual=0.0.
  prompt_injection_review: 0.50
  harmful_content_review: 0.83
  sexual_review: 1.10

  # Injection veto: a row is only labelled prompt_injection if the injection
  # score clears prompt_injection_review AND the moderation harmful score stays
  # below this cap. Real injections are high-attack + low-moderation; toxic
  # content the injection model mistakes for an attack is high on both, so this
  # veto suppresses those false positives. 1.01 = veto disabled.
  prompt_injection_max_harmful: 1.01

runtime:
  device: "cuda"
  # ONNX provider for MiniLM moderation: auto | cpu | cuda. "auto" uses CUDA
  # when onnxruntime-gpu is installed, otherwise CPUExecutionProvider.
  onnx_provider: "auto"
  max_length: 128
  fp16_on_cuda: true
  full_scan_default: true
  fasttext_direct_safe_enabled: false
  fasttext_direct_classification_enabled: false
