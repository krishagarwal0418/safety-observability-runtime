models:
  fasttext_router:
    # Preferred: upload models/fasttext/router_head.ftz to a HF repo and set repo_id.
    repo_id: "Krishagarwal314/safety-fasttext-router"
    filename: "router_head.ftz"
    local_path: "models/fasttext/router_head.ftz"

  prompt_injection:
    # Replace with your fine-tuned/quantized prompt-injection repo if uploaded.
    repo_id: "Krishagarwal314/safety-prompt-injection"
    local_path: "models/transformers/prompt_injection"

  prompt_injection_onnx_int8:
    # Optional artifact for deployment experiments; runtime uses prompt_injection above by default.
    repo_id: "Krishagarwal314/safety-prompt-injection-onnx-int8"
    local_path: "models/onnx_int8/prompt_injection"

  moderation:
    # Replace with your fine-tuned 2-label Koala merged moderation repo.
    repo_id: "Krishagarwal314/safety-moderation-2head"
    local_path: "models/transformers/moderation"

  moderation_onnx_int8:
    # Optional artifact for CPU batch evaluation/deployment experiments.
    repo_id: "Krishagarwal314/safety-moderation-2head-onnx-int8"
    local_path: "models/onnx_int8/moderation"

thresholds:
  # Calibrated on the narrowed observability scope:
  # prompt-injection/attack, toxicity, hate, harassment, sexual, and safe.
  # Violence, self-harm, dangerous information, and illegal activity are not
  # claimed as supported by these thresholds.
  attack_route: 0.01
  moderation_route: 0.0
  fast_allow: 0.0

  # FastText direct classification. Only direct prompt-injection is active.
  fasttext_direct_prompt_injection_score: 0.8
  fasttext_direct_prompt_injection_max_moderation: 0.05
  fasttext_direct_harmful_content_score: 1.1
  fasttext_direct_harmful_content_max_attack: 0.001

  # Direct safe-pass is intentionally disabled with an impossible threshold.
  fasttext_direct_safe_score: 1.1
  fasttext_direct_safe_max_route: 0.0

  # BERT score thresholds for observability counters.
  # 0.50 chosen from probe analysis: real injections score 0.999-1.000,
  # toxic/safe score 0.000-0.015. ShieldLM dataset noise drove the
  # calibrated threshold near 0 causing 48k FP on 50k rows; that dataset
  # mislabels benign queries as injection and should not be used for
  # injection threshold calibration.
  prompt_injection_review: 0.50
  harmful_content_review: 0.40
  sexual_review: 0.70

  # Injection veto: a row is only labelled prompt_injection if the injection
  # score clears prompt_injection_review AND the moderation BERT's harmful score
  # stays below this cap. Real injections are high-attack + low-moderation;
  # toxic content the injection model mistakes for an attack is high on both,
  # so this veto suppresses those false positives. 1.01 = veto disabled.
  prompt_injection_max_harmful: 1.01

runtime:
  device: "cuda"
  max_length: 128
  fp16_on_cuda: true
  full_scan_default: false
  fasttext_direct_safe_enabled: false
  fasttext_direct_classification_enabled: true
